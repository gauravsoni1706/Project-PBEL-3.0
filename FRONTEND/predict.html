<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fraud Detection Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="./static/css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="index.html">
🛡 AI Fraud Detection
</a>

<a href="index.html" class="btn btn-light">
Home
</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center mb-4">

Upload Credit Card CSV

</h2>

<form id="uploadForm">

<input
id="csvFile"
type="file"
class="form-control"
accept=".csv"
required>

<div class="text-center mt-4">

<button class="btn btn-primary btn-lg">

Predict Fraud

</button>

</div>

</form>

</div>

</div>

<!-- Results -->

<div id="resultSection" style="display:none;">

<div class="row mt-5">

<div class="col-md-4">

<div class="card shadow text-center">

<div class="card-body">

<h2 id="total"></h2>

<p>Total Transactions</p>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow text-center">

<div class="card-body">

<h2 class="text-danger" id="fraud"></h2>

<p>Fraud</p>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow text-center">

<div class="card-body">

<h2 class="text-success" id="genuine"></h2>

<p>Legitimate</p>

</div>

</div>

</div>

</div>

<div class="card shadow mt-4">

<div class="card-body">

<h3>Model Performance</h3>

<div class="row text-center">

<div class="col">Accuracy <h4 id="accuracy"></h4></div>

<div class="col">Precision <h4 id="precision"></h4></div>

<div class="col">Recall <h4 id="recall"></h4></div>

<div class="col">F1 Score <h4 id="f1"></h4></div>

</div>

</div>

</div>

<div class="card shadow mt-4">

<div class="card-body">

<h3>Prediction Chart</h3>

<div id="chartContainer"></div>

</div>

</div>

<div class="card shadow mt-4">

<div class="card-body">

<h3>First 10 Predictions</h3>

<div id="tableContainer"></div>

</div>

</div>

<div class="text-center mt-4 mb-5">

<a id="downloadBtn"
class="btn btn-success btn-lg"
target="_blank">

Download Prediction CSV

</a>

</div>

</div>

</div>

<script src="./static/js/app.js"></script>

</body>

</html>
